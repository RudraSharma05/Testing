<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Sorting Visualizer</title>
  </head>
  <body>

    <div class="container">
      <div class="bars_container" id="bars_container"></div>

      <div class="buttons_container">
        <label for="slider">Array Size:</label>
        <label for="slider"> 20</label>
        <input
          type="range"
          id="slider"
          min="20"
          max="100"
          step="5"
          value="20"
        />
        <label for="slider"> 100 </label>

        <select name="" id="speed">

          <option value="50">Medium</option>
          <option value="100">slow</option>
          <option value="10">Fast</option>
          
        </select>
        <select name="" id="algo">
          <option value="bubble">Bubble Sort</option>
          <option value="insertion">Insertion Sort</option>
          <option value="heap">Heap Sort</option>
          <option value="quick">Quick Sort</option>
        </select>
        <button id="randomize_array_btn">Randomize Array</button>
        <button id="sort_btn">Sort</button>
      </div>
    </div>

    <script src="index.js"></script>

    <div class="phone_view">
      <p> Please rotate the device </p>
    </div>

  </body>
</html>
